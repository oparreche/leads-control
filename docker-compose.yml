version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: leads-control-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: leads_control
      MYSQL_USER: leads_user
      MYSQL_PASSWORD: leads_pass123
    ports:
      - '3307:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

volumes:
  mysql_data:
